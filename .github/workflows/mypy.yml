name: Mypy Type Checking

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  type_check:
    name: Run mypy type checking
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Mypy (lib)
      run: |
        mypy blender_api_lib --python-version ${{ matrix.python-version }}

    - name: Run Mypy (examples)
      run: |
        mypy examples --python-version ${{ matrix.python-version }}

    - name: Run Mypy (tests)
      run: |
        mypy tests --python-version ${{ matrix.python-version }}